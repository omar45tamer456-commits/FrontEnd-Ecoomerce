<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaShop | Checkout</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar container">
      <a class="logo" href="../index.html">NovaShop</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html" class="active">Cart</a>
        <a href="profile.html">Profile</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="page-banner">
      <p class="page-tag">Secure Checkout</p>
      <h1>Checkout</h1>
      <p>Enter shipping and payment details in a clean form layout.</p>
    </section>

    <section class="form-layout section">
      <form class="form-box">
        <h2>Billing Details</h2>
        <div class="field-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="Enter your name">
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email">
        </div>
        <div class="field-group">
          <label for="address">Address</label>
          <input id="address" type="text" placeholder="Street address">
        </div>
        <div class="field-group">
          <label for="city">City</label>
          <input id="city" type="text" placeholder="City">
        </div>
        <div class="field-group">
          <label for="payment">Payment Method</label>
          <select id="payment">
            <option>Credit Card</option>
            <option>Cash on Delivery</option>
          </select>
        </div>
        <a class="btn" href="orders.html">Place Order</a>
      </form>

      <aside class="summary-box">
        <h3>Checkout Summary</h3>
        <div class="summary-line">
          <span>Items</span>
          <span>3</span>
        </div>
        <div class="summary-line">
          <span>Subtotal</span>
          <span>$219</span>
        </div>
        <div class="summary-line">
          <span>Shipping</span>
          <span>$10</span>
        </div>
        <div class="summary-line summary-total">
          <span>Total</span>
          <span>$229</span>
        </div>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; 2026 NovaShop. All rights reserved.</p>
      <div class="footer-links">
        <a href="faq.html">FAQ</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </footer>
</body>
</html>
