<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaShop | Register</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar container">
      <a class="logo" href="../index.html">NovaShop</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="profile.html">Profile</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="page-banner">
      <p class="page-tag">Create Account</p>
      <h1>Register</h1>
      <p>New users can create an account with this simple form page.</p>
    </section>

    <section class="section">
      <form class="form-box" style="max-width: 620px; margin: 0 auto;">
        <h2>Start Shopping</h2>
        <div class="field-group">
          <label for="register-name">Full Name</label>
          <input id="register-name" type="text" placeholder="Enter your name">
        </div>
        <div class="field-group">
          <label for="register-email">Email</label>
          <input id="register-email" type="email" placeholder="Enter your email">
        </div>
        <div class="field-group">
          <label for="register-password">Password</label>
          <input id="register-password" type="password" placeholder="Create a password">
        </div>
        <div class="field-group">
          <label for="register-phone">Phone</label>
          <input id="register-phone" type="text" placeholder="Enter your phone number">
        </div>
        <a class="btn" href="login.html">Create Account</a>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; 2026 NovaShop. All rights reserved.</p>
      <div class="footer-links">
        <a href="faq.html">FAQ</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </footer>
</body>
</html>
